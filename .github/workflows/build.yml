name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install matplotlib openpyxl tkinterdnd2 pyinstaller pillow

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed
          --collect-all tkinterdnd2
          --name ReliabilityAnalyzer
          reliability_analyzer.py

      - name: Zip
        run: Compress-Archive -Path dist/ReliabilityAnalyzer.exe -DestinationPath ReliabilityAnalyzer.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: ReliabilityAnalyzer.zip
